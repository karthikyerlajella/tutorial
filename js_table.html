<!doctype html>
<html>
<head>
<title>Dynamic Table from User Input</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">

  <div class="container text-center">
    <h1 class="text-primary mb-4">Create Table from Input</h1>
    
   
    <input type="number" id="numInput" class="form-control w-25 d-inline mb-3" placeholder="Enter number of rows">
    
    
    <button class="btn btn-success mb-3" onclick="createTable()">Generate Table</button>
    
   
    <div id="output" class="mt-3"></div>
  </div>

<script>
function createTable() {
  let n = parseInt(document.getElementById("numInput").value);
  let res = "<table class='table table-bordered table-striped'>";
  res += "<thead class='table-dark'><tr><th>S.no</th><th>Value</th></tr></thead><tbody>";


  for (let i = 1; i <= n; i++) {
    res += "<tr><td>" + i + "</td><td>Row " + i + "</td></tr>";
  }

  res += "</tbody></table>";


  document.getElementById("output").innerHTML = res;
}
</script>

</body>
</html>
