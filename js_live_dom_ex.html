<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live DOM PlayGround</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #0f0f13;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #00f2fe;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px 28px;
            width: 100%;
            max-width: 620px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.45);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input[type="text"] {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 10px 14px;
            color: white;
            font-family: inherit;
            font-size: 15px;
            outline: none;
            min-width: 220px;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            border-color: #00f2fe;
        }

        input[type="color"] {
            width: 48px;
            height: 42px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            background: none;
            cursor: pointer;
            padding: 2px;
        }

        select {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            padding: 10px 14px;
            color: white;
            font-family: inherit;
            font-size: 14px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        select:focus {
            border-color: #00f2fe;
        }

        select option {
            background: #1a1a2e;
        }

        #displayArea {
            min-height: 80px;
            width: 100%;
            max-width: 620px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 16px;
            padding: 24px;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
            transition: font-size 0.2s, color 0.2s;
            word-wrap: break-word;
            text-align: center;
        }
    </style>
</head>

<body>

    <h1>Live DOM PlayGround</h1>

    <div class="controls">

        <div class="field">
            <label for="textInput">Enter Text</label>
            <input type="text" id="textInput" placeholder="Start typing...">
        </div>

        <div class="field">
            <label for="colorPicker">Text Color</label>
            <input type="color" id="colorPicker" value="#00f2fe">
        </div>
        <div class="bg">
            <label for="bgColor">Background Color</label>
            <input type="color" id="bgColor" value="#0f0f13">
        </div>
        <div class="font">
            <input type="checkbox" id="bold">Bold</b>
            <input type="checkbox" id="italic">italic</i>
        </div>
        <div class="field">
            <label for="fontSize">Font Size</label>
            <select id="fontSize">
                <option value="16px">Small</option>
                <option value="24px">Medium</option>
                <option value="32px">Large</option>
                <option value="48px">Extra Large</option>
                <option value="60px">Extra Extra Large</option>
            </select>
        </div>

    </div>

    <div id="displayArea">Your text will appear here...</div>

    <script>
        let input = document.getElementById("textInput");
        let color = document.getElementById("colorPicker");
        let size = document.getElementById("fontSize");
        let bgColor = document.getElementById("bgColor");
        let bold = document.getElementById("bold");
        let italic = document.getElementById("italic");

        let display = document.getElementById("displayArea");


        input.addEventListener("input", function () {
            display.textContent = input.value || "Your text will appear here...";
            display.style.color = input.value ? color.value : "rgba(255,255,255,0.3)";
        });

        color.addEventListener("input", function () {
            display.style.color = color.value;
        });
        bgColor.addEventListener("input", function () {
            display.style.backgroundColor = bgColor.value;
        });
        bold.addEventListener("change", function () {
            if (bold.checked) {
                display.style.fontWeight = "bold";
            } else {
                display.style.fontWeight = "normal";
            }
        });

        italic.addEventListener("change", function () {
            if (italic.checked) {
                display.style.fontStyle = "italic";
            } else {
                display.style.fontStyle = "normal";
            }
        });
        size.addEventListener("change", function () {
            display.style.fontSize = size.value;
        });

    </script>

</body>

</html>
