<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ✅ FIX 1: </tilte> → </title> -->
  <title>Registration Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #0f0f13;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      color: white;
    }

    .form-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 24px;
      padding: 36px 40px;
      width: 100%;
      max-width: 540px;
    }

    .form-title {
      text-align: center;
      font-size: 22px;
      font-weight: 700;
      color: #00f2fe;
      margin-bottom: 28px;
      letter-spacing: -0.3px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 7px;
    }

    input[type="text"],
    input[type="password"],
    input[type="email"],
    input[type="date"],
    input[type="datetime-local"],
    input[type="search"],
    textarea,
    select {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px 14px;
      color: white;
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #00f2fe;
      background: rgba(0, 242, 254, 0.06);
    }

    input[type="date"]::-webkit-calendar-picker-indicator,
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
    }

    select option {
      background: #1a1a2e;
    }


    .radio-group,
    .check-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .radio-group label,
    .check-group label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      text-transform: none;
      letter-spacing: 0;
      cursor: pointer;
    }

    input[type="radio"],
    input[type="checkbox"] {
      accent-color: #00f2fe;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }


    .skill-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .skill-row span {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
      width: 40px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #00f2fe;
      padding: 0;
      border: none;
      background: none;
    }

    input[type="file"] {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px dashed rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 12px 14px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      cursor: pointer;
    }

    .divider {
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
      margin: 24px 0;
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      flex: 1;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-reset {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.6);
    }

    .btn-reset:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    .btn-submit {
      background: linear-gradient(135deg, #00f2fe, #4facfe);
      color: #000;
    }

    .btn-submit:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>


  <div class="form-card">
    <form action="#" method="get">

      <div class="form-title">📋 Registration Form</div>

      <div class="field">
        <label for="username">Username</label>
        <input type="text" name="username" id="username" autofocus placeholder="Enter username">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" name="password" id="password" placeholder="Enter password">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter email">
      </div>


      <div class="field">
        <label for="Address">Address</label>
        <textarea name="Address" id="Address" placeholder="Enter your address"></textarea>
      </div>

      <div class="field">
        <label>Gender</label>
        <div class="radio-group">
          <label><input type="radio" name="Gender" value="Male"> Male</label>
          <label><input type="radio" name="Gender" value="Female"> Female</label>
        </div>
      </div>


      <div class="field">
        <label>Courses</label>
        <div class="check-group">
          <label><input type="checkbox" name="course" value="DBMS"> DBMS</label>
          <label><input type="checkbox" name="course" value="OS"> OS</label>
          <label><input type="checkbox" name="course" value="Full Stack"> Full Stack</label>
        </div>
      </div>

      <div class="field">
        <label for="branch">Branch</label>
        <select name="branch" id="branch">
          <option value="CSE">CSE</option>
          <option value="ECE">ECE</option>
        </select>
      </div>

      <div class="field">
        <label for="dob">Date of Birth</label>
        <input type="date" name="dob" id="dob">
      </div>

      <div class="field">
        <label for="datetime">Date &amp; Time</label>
        <input type="datetime-local" name="datetime" id="datetime">
      </div>

      <div class="field">
        <label for="photo">Photo Upload</label>
        <input type="file" name="photo" id="photo" accept="image/*">
      </div>

      <div class="field">
        <label for="search">Search</label>
        <input type="search" name="search" id="search" placeholder="Search...">
      </div>

      <div class="field">
        <label>Skills</label>
        <div class="skill-row"><span>HTML</span><input type="range" name="html" min="0" max="100"></div>
        <div class="skill-row"><span>CSS</span><input type="range" name="css" min="0" max="100"></div>
        <div class="skill-row"><span>JS</span><input type="range" name="js" min="0" max="100"></div>
        <div class="skill-row"><span>React</span><input type="range" name="react" min="0" max="100"></div>
      </div>

      <div class="divider"></div>

      <div class="btn-row">
        <button type="reset" class="btn-reset">Reset</button>
        <button type="submit" class="btn-submit">Submit</button>
      </div>


    </form>
  </div>



</body>

</html>
