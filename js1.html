<!doctype html>
<html>
<head>
<title>Even or Odd Check</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">

  <div class="container text-center">
    <h1 class="text-primary mb-4">JavaScript  Demo</h1>
    <form>
      <input type="text" class="form-control mb-3" placeholder="Type something here" id="number">
      <input type="button" class="btn btn-success" onclick="test()" value="click Now">
    </form><br>
   
    
    <button class="btn btn-success" onclick="test()">Check Number</button>
    <div id="output" class="fw-bold text-dark"></div>
  </div>

<script>
 function test() {
   /*var a = 3;
   if (a % 2 == 0) {
     alert("even");
   } else {
     alert("odd");
   }*/

 var n = parseInt(document.getElementById("number").value);
  var res = "";
  for (let i = 0; i < n; i++) {
    res += "Iteration " + (i+1) + ": hi\n";
  }
  alert(res);
}
</script>

</body>
</html>
