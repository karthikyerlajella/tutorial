<!doctype html>
<html>
<head>
<title>Even or Odd & Star Pattern</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">

  <div class="container text-center">
    <h1 class="text-primary mb-4">Even or Odd & Star Pattern</h1>
    
    <input type="number" id="numInput" class="form-control w-25 d-inline mb-3" placeholder="Enter a number">
    <button class="btn btn-success mb-3" onclick="checkAndPattern()">Run</button>
    
    <pre id="output" class="fw-bold text-dark mt-3"></pre>
  </div>

<script>
function checkAndPattern() {
  let n = parseInt(document.getElementById("numInput").value);
  let res = "";

 
  if (n % 2 === 0) {
    res += "The number " + n + " is EVEN\n\n";
  } else {
    res += "The number " + n + " is ODD\n\n";
  }

 
  for (let i = 1; i <= n; i++) {
    for (let j = 1; j <= i; j++) {
      res += "*";
    }
    res += "\n";
  }

  document.getElementById("output").textContent = res;
}
</script>

</body>
</html>
