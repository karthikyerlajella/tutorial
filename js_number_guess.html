<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Number Guessing Game</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    h1 { font-size: 22px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 1.25rem; }

    .stats {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }
    .stat {
      flex: 1;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 8px 12px;
    }
    .stat-label { font-size: 11px; color: #999; }
    .stat-val { font-size: 22px; font-weight: 600; color: #222; }

    .price-bar-wrap {
      margin-bottom: 1.25rem;
    }
    .price-bar-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 4px;
    }
    .price-bar-bg {
      background: #f0f0f0;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
    }
    .price-bar-fill {
      height: 10px;
      border-radius: 99px;
      background: #1D9E75;
      transition: width 0.4s ease, background 0.4s ease;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }
    .input-row input {
      flex: 1;
      height: 42px;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 0 12px;
      font-size: 16px;
      outline: none;
      background: #fafafa;
    }
    .input-row input:focus { border-color: #1D9E75; box-shadow: 0 0 0 2px #1D9E7530; }

    button {
      height: 42px;
      padding: 0 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      font-size: 14px;
      cursor: pointer;
    }
    button:hover { background: #f5f5f5; }
    button:active { transform: scale(0.98); }

    .btn-primary {
      background: #1D9E75;
      border-color: #1D9E75;
      color: #fff;
      font-weight: 600;
    }
    .btn-primary:hover { background: #0F6E56; }

    .feedback {
      min-height: 48px;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 1rem;
      background: #f5f5f5;
      color: #666;
    }
    .feedback.info   { background: #E1F5EE; color: #0F6E56; }
    .feedback.danger { background: #FCEBEB; color: #A32D2D; }
    .feedback.warn   { background: #FAEEDA; color: #854F0B; }
    .feedback.win    { background: #EAF3DE; color: #3B6D11; }
    .feedback-icon   { font-size: 18px; }

    .section-label {
      font-size: 11px;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .history { display: flex; flex-wrap: wrap; gap: 6px; min-height: 28px; }
    .tag {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid #ddd;
      background: #f5f5f5;
      color: #555;
    }
    .tag.hi { background: #FAECE7; border-color: #F0997B; color: #993C1D; }
    .tag.lo { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; }
  </style>
</head>
<body>

<div class="card">
  <h1>Guess the number</h1>
  <p class="subtitle">
    Guess a number between <strong>1–100</strong>.<br>
    Every wrong guess deducts <strong>$10</strong> from your price. Don't go broke!
  </p>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">💰 Current Price</div>
      <div class="stat-val" id="priceDisplay">$100</div>
    </div>
    <div class="stat">
      <div class="stat-label">🎯 Guesses Made</div>
      <div class="stat-val" id="guessMade">0</div>
    </div>
  </div>

  <div class="price-bar-wrap">
    <div class="price-bar-label">Price remaining</div>
    <div class="price-bar-bg">
      <div class="price-bar-fill" id="priceBar" style="width: 100%;"></div>
    </div>
  </div>

  <div class="input-row">
    <input type="number" id="userInput" min="1" max="100" placeholder="Enter 1–100" />
    <button class="btn-primary" onclick="makeGuess()">Guess</button>
    <button onclick="resetGame()">New</button>
  </div>

  <div class="feedback" id="feedback">
    <span class="feedback-icon">💡</span>
    <span>Enter a number and press Guess to start.</span>
  </div>

  <p class="section-label">Previous guesses</p>
  <div class="history" id="history">
    <span style="font-size:13px; color:#aaa;">None yet</span>
  </div>
</div>

<script>
  const MAX_PRICE    = 100;
  const PENALTY      = 10;   // price deducted per wrong guess
  let secret, price, guesses, gameOver;

  function resetGame() {
    secret   = Math.floor(Math.random() * 100) + 1;
    price    = MAX_PRICE;
    guesses  = [];
    gameOver = false;

    document.getElementById('userInput').value    = '';
    document.getElementById('userInput').disabled = false;
    document.getElementById('priceDisplay').textContent  = '$' + price;
    document.getElementById('guessMade').textContent     = 0;
    document.getElementById('history').innerHTML =
      '<span style="font-size:13px;color:#aaa;">None yet</span>';

    updateBar(price);
    setFeedback('default', '💡', 'Enter a number and press Guess to start.');
  }

  function updateBar(currentPrice) {
    const pct  = (currentPrice / MAX_PRICE) * 100;
    const fill = document.getElementById('priceBar');
    fill.style.width = pct + '%';
    // color changes: green → amber → red
    if (pct > 50)      fill.style.background = '#1D9E75';
    else if (pct > 20) fill.style.background = '#EF9F27';
    else               fill.style.background = '#E24B4A';
  }

  function setFeedback(type, icon, msg) {
    const el = document.getElementById('feedback');
    el.className = 'feedback' + (type !== 'default' ? ' ' + type : '');
    el.innerHTML = '<span class="feedback-icon">' + icon + '</span><span>' + msg + '</span>';
  }

  function makeGuess() {
    if (gameOver) return;

    const input = document.getElementById('userInput');
    const val   = parseInt(input.value, 10);

    if (isNaN(val) || val < 1 || val > 100) {
      setFeedback('danger', '⚠️', 'Please enter a valid number between 1 and 100.');
      return;
    }

    guesses.push(val);
    document.getElementById('guessMade').textContent = guesses.length;

    const histEl = document.getElementById('history');
    if (guesses.length === 1) histEl.innerHTML = '';
    const tag = document.createElement('span');

  
    if (val === secret) {
      tag.className   = 'tag';
      tag.textContent = val;
      histEl.appendChild(tag);
      setFeedback('win', '🎉',
        'Correct! The number was <strong>' + secret + '</strong>. ' +
        'You won with <strong>$' + price + '</strong> remaining!');
      gameOver = true;
      input.disabled = true;
      return;
    }

    
    price -= PENALTY;
    document.getElementById('priceDisplay').textContent = '$' + price;
    updateBar(price);

    const diff = Math.abs(secret - val);
    const hint = diff <= 5 ? ' Very close!' : diff <= 15 ? ' Getting warmer.' : ' Far off.';

    if (val > secret) {
      tag.className   = 'tag hi';
      tag.textContent = val + ' ▲';
      const msg = '<strong>' + val + '</strong> is too high.' + hint +
                  ' <strong>-$' + PENALTY + '</strong> deducted.';
      price <= 20
        ? setFeedback('warn', '🔴', msg + ' Price critically low!')
        : setFeedback('info', '🔴', msg);
    } else {
      tag.className   = 'tag lo';
      tag.textContent = val + ' ▼';
      const msg = '<strong>' + val + '</strong> is too low.' + hint +
                  ' <strong>-$' + PENALTY + '</strong> deducted.';
      price <= 20
        ? setFeedback('warn', '🔵', msg + ' Price critically low!')
        : setFeedback('info', '🔵', msg);
    }

    histEl.appendChild(tag);
    input.value = '';

    
    if (price <= 0) {
      document.getElementById('priceDisplay').textContent = '$0';
      setFeedback('danger', '😢',
        'Price hit $0! The number was <strong>' + secret + '</strong>. Try again!');
      gameOver = true;
      input.disabled = true;
    }
  }

  document.getElementById('userInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') makeGuess();
  });

  resetGame();
</script>

</body>
</html>
