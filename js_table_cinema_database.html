<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Database</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        table {
            border-collapse: collapse;
            width: 50%;
            margin-top: 20px;
        }

        table,
        th,
        td {
            border: 2px solid rgb(215, 200, 35);
        }

        th,
        td {
            padding: 8px;
            text-align: center;
        }
    </style>
</head>

<body>

    <h2 class="text-center text-danger">Software Database</h2>

    <table class="table table-dark table-striped table-hover table-bordered text-center align-middle" id="cinemaTable">
        <thead>
            <tr>
                <th>S.no</th>
                <th>Software Name</th>
                <th>Company</th>
            </tr>
        </thead>
        <tbody id="tableBody">
        </tbody>
    </table>

    <script>
        //console.log(a);//hoisting not allowed with 'let' but is of with 'var';

        // var a = 10; {

        function text() {
            /* const names = ['karthik', 'uday', 'vijay', 'ramesh'];

                 console.log(names[0]);
             }
             //document.getElementById("op").innerHTML = names.toString;
             console.log(names[1]); //output*/

            // 1. Define your input array of objects
            const software = [
                { id: 1, name: "Windows 11", company: "Microsoft" },
                { id: 2, name: "macOS Sonoma", company: "Apple" },
                { id: 3, name: "Android 14", company: "Google" },
                { id: 4, name: "Visual Studio", company: "Microsoft" },
                { id: 5, name: "Xcode", company: "Apple" },
                { id: 6, name: "Figma", company: "Adobe" },
                { id: 7, name: "Photoshop", company: "Adobe" },
                { id: 8, name: "Chrome", company: "Google" },
                { id: 9, name: "Slack", company: "Salesforce" },
                { id: 10, name: "VS Code", company: "Microsoft" }
            ];


            const tableBody = document.getElementById("tableBody");


            software.forEach(function (software) {


                const row = document.createElement("tr");


                row.innerHTML = `
                <td>${software.id}</td>
                <td>${software.name}</td>
                <td>${software.company}</td>
              `;
                tableBody.appendChild(row);
            });
        }


        text();

    </script>
