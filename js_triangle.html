<!doctype html>
<html>
<head>
<title>Traingle logic</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-5 bg-light">

  <div class="container text-center">
    <h1 class="text-primary mb-4">Triangle</h1>
    
    <input type="number" id="num" class="form-control w-25 d-inline mb-3" placeholder="Enter a number">
    <button class="btn btn-success mb-3" onclick="check()">Run</button>
    
    <pre id="output" class="fw-bold text-dark mt-3"></pre>
  </div>

<script>
function check() {
  let n = parseInt(document.getElementById("num").value);
 
  let res =n*(n-2)/8;
  
  document.getElementById("output").textContent = res;
}
</script>

</body>
</html>
