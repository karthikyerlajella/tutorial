<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vibe Verdict</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #0f0f13;
      overflow: hidden;
    }


    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: #7c3aed;
      top: -100px;
      left: -100px;
    }

    .blob-2 {
      width: 350px;
      height: 350px;
      background: #06b6d4;
      bottom: -80px;
      right: -80px;
    }

    .blob-3 {
      width: 250px;
      height: 250px;
      background: #ec4899;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.09);
      border-radius: 28px;
      padding: 44px 40px 40px;
      width: 400px;
      max-width: 95vw;
      backdrop-filter: blur(24px);
    }

    /* Badge at top */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(124, 58, 237, 0.18);
      border: 1px solid rgba(124, 58, 237, 0.35);
      color: #a78bfa;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      margin-bottom: 18px;
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #a78bfa;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 6px;
    }

    h1 span {
      color: #a78bfa;
    }

    .sub {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.38);
      margin-bottom: 30px;
      line-height: 1.6;
    }


    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.45);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 15px;
      color: #fff;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
      -webkit-appearance: none;
    }

    .field input::placeholder {
      color: rgba(255, 255, 255, 0.2);
    }

    .field input:focus {
      border-color: rgba(124, 58, 237, 0.6);
      background: rgba(124, 58, 237, 0.08);
    }

    .field input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }


    .dots {
      display: flex;
      gap: 5px;
      margin-top: 8px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      transition: background 0.3s;
    }

    .dot.filled {
      background: #a78bfa;
    }


    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      transition: background 0.2s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(124, 58, 237, 0.35);
    }

    .btn:hover::after {
      background: rgba(255, 255, 255, 0.07);
    }

    .btn:active {
      transform: translateY(0);
    }


    #result {
      display: none;
      margin-top: 24px;
      border-radius: 18px;
      padding: 22px 20px;
      font-size: 14px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.85);
      animation: rise 0.45s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(14px) scale(0.97);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    #result.win {
      background: rgba(124, 58, 237, 0.12);
      border: 1px solid rgba(124, 58, 237, 0.3);
    }

    #result.lose {
      background: rgba(236, 72, 153, 0.09);
      border: 1px solid rgba(236, 72, 153, 0.22);
    }

    .result-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .result-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .win .result-icon {
      background: rgba(124, 58, 237, 0.2);
    }

    .lose .result-icon {
      background: rgba(236, 72, 153, 0.15);
    }

    .result-title {
      font-weight: 700;
      font-size: 16px;
      color: #fff;
    }

    .result-body {
      font-size: 13.5px;
      color: rgba(255, 255, 255, 0.6);
    }

    .bday-line {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
    }


    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 20px 0 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.07);
    }

    .divider-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>

<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">
    <div class="badge"><span class="badge-dot"></span> Live verdict</div>
    <h1>The <span>Vibe</span> Verdict ⚡</h1>
    <p class="sub">Enter the secret password and your birthday.<br>Let the universe decide your worth.</p>

    <div class="field">
      <label>Secret Password</label>
      <input type="password" id="pass" placeholder="Type your guess…" oninput="updateDots()" required />
      <div class="dots" id="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <div class="field">
      <label>Your Birthday</label>
      <input type="date" id="bday" required />
    </div>

    <button class="btn" onclick="analyze()">⚖️ BE MY FRIEND</button>

    <div id="result">
      <div class="result-header">
        <div class="result-icon" id="resIcon"></div>
        <div class="result-title" id="resTitle"></div>
      </div>
      <div class="result-body" id="resBody"></div>
      <div class="bday-line" id="resBday" style="display:none;"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>

    const KEY = "today";

    const WIN_TITLE = "The Chosen One Has Arrived 👑";
    const WIN_BODY = "No way... you actually did it. Out of everyone who's tried, YOU are the one who figured it out. The prophecy was real. Welcome to the inner circle — it's warm here.";

    const LOSE_TITLE = "Close, But the Universe Said No 🌌";
    const LOSE_BODY = "I respect the confidence. I really do. But the password gods looked down today and simply said: not yet. Come back stronger, wiser, and maybe a little luckier.";

    const BDAY_MATCH = "🎂 YOUR BIRTHDAY IS TODAY?! Drop everything — today is YOUR day. The whole universe took a day off just to celebrate you. Go enjoy every second of it!";
    const BDAY_NO = "📅 Not your birthday today, huh? That's okay. Your day is coming. Until then, keep being quietly legendary in the background.";


    function updateDots() {
      const val = document.getElementById('pass').value;
      const dots = document.querySelectorAll('.dot');
      const fill = Math.min(val.length, 5);
      dots.forEach((d, i) => d.classList.toggle('filled', i < fill));
    }

    function analyze() {
      const pass = document.getElementById('pass').value.trim().toLowerCase();
      const bday = document.getElementById('bday').value;
      const result = document.getElementById('result');
      const isWin = pass === KEY;

      document.getElementById('resIcon').textContent = isWin ? '🏆' : '😅';
      document.getElementById('resTitle').textContent = isWin ? WIN_TITLE : LOSE_TITLE;
      document.getElementById('resBody').textContent = isWin ? WIN_BODY : LOSE_BODY;

      if (bday) {
        const today = new Date();
        const chosen = new Date(bday);
        const match = today.getMonth() === chosen.getUTCMonth() &&
          today.getDate() === chosen.getUTCDate();
        const bdayEl = document.getElementById('resBday');
        bdayEl.textContent = match ? BDAY_MATCH : BDAY_NO;
        bdayEl.style.display = 'block';
      } else {
        document.getElementById('resBday').style.display = 'none';
      }

      result.style.display = 'block';
      result.className = isWin ? 'win' : 'lose';

      result.style.animation = 'none';
      void result.offsetWidth;
      result.style.animation = '';

      if (isWin) {
        confetti({ particleCount: 180, spread: 80, origin: { y: 0.55 }, colors: ['#a78bfa', '#06b6d4', '#ffffff'] });
        setTimeout(() => confetti({ particleCount: 60, angle: 60, spread: 55, origin: { x: 0 } }), 400);
        setTimeout(() => confetti({ particleCount: 60, angle: 120, spread: 55, origin: { x: 1 } }), 600);
      }
    }

    document.getElementById('pass').addEventListener('keydown', e => {
      if (e.key === 'Enter') analyze();
    });
  </script>
</body>

</html>
