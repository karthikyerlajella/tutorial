<!-- CSS Example -->
<details style="font-family:Times New Roman;">
  <summary>Inline</summary>
  <p>Used to apply for a specific tag.</p>

<form action="https://www.google.com/" method="get" align="center" style="font-famlity:Arial; font-size:10px;">
  <table border="3" cellpadding="5" cellspacing="0">
    <tr>
      <th colspan="2" align="center"><mark>Registration Form</mark></th>
    </tr>
    <tr>
      <td><label for="username">Username</label></td>
      <td><input type="text" name="username" id="username" autofocus></td>
    </tr>
    <tr>
      <td><label for="password">Password</label></td>
      <td><input type="password" id="password" name="password"></td>
    </tr>
    <tr>
      <td><label for="email">Email</label></td>
      <td><input type="email" id="email" name="email"></td>
    </tr>
    <tr>
      <td><label for="address">Address</label></td>
      <td><textarea name="address" id="address"></textarea></td>
    </tr>
    <tr>
      <td><label>Gender</label></td>
      <td>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
      </td>
    </tr>
    <tr>
      <td><label>Courses</label></td>
      <td>
        <input type="checkbox" name="course" value="DBMS"> DBMS
        <input type="checkbox" name="course" value="OS"> OS
        <input type="checkbox" name="course" value="Full Stack"> Full Stack
      </td>
    </tr>
    <tr>
      <td><label>Branch</label></td>
      <td>
        <select name="branch">
          <option>CSE</option>
          <option>ECE</option>
        </select>
      </td>
    </tr>
    <tr>
      <td><label>DOB</label></td>
      <td><input type="date" name="dob"></td>
    </tr>
    <tr>
      <td><label>Date & Time</label></td>
      <td><input type="datetime-local" name="datetime"></td>
    </tr>
    <tr>
      <td><label>Photo Upload</label></td>
      <td><input type="file" name="photo"></td>
    </tr>
    <tr>
      <td><label>Search</label></td>
      <td><input type="search" name="search" placeholder="search"></td>
    </tr>
    <tr>
      <td><label>Skills</label></td>
      <td>
        <label>HTML</label><input type="range" name="html"><br>
        <label>CSS</label><input type="range" name="css"><br>
        <label>JS</label><input type="range" name="js"><br>
        <label>React</label><input type="range" name="react">
      </td>
    </tr>
    <tr>
      <td align="center"><button type="reset" style="color:red;">Reset</button></td>
      <td align="center"><button type="submit" style="color:green;">Submit</button></td>
    </tr>
  </table>
</form>
